<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self';" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MotoVerse — India's leading two-wheeler company. Explore motorcycles, scooters, and electric vehicles." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Preload the Inter variable font file (contains all weights) for LCP -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMwMdVGZsGIKzX7.woff2" as="font" type="font/woff2" crossorigin>
    
    <!-- Optimized inlined @font-face rule for Inter variable font to prevent CLS from font swapping -->
    <!-- This ensures font metrics are available immediately when main CSS is parsed, with minimal HTML payload. -->
    <style>
      /* Inter Variable Font - latin */
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 400 900; /* Define the range of weights available in the variable font */
        font-display: swap;
        src: url(https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMwMdVGZsGIKzX7.woff2) format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>
    
    <!-- Ensure critical application styles (e.g., Tailwind CSS) are loaded synchronously to prevent FCP/LCP delays -->
    <link rel="stylesheet" href="/src/index.css">
    <title>MotoVerse — Born to Lead</title>
  </head>
  <body class="bg-white text-dark">
    <!-- Static placeholder for HeroBanner's first slide to improve FCP/LCP -->
    <!-- This content will be visible immediately and serve as the LCP element. -->
    <!-- It will be hidden by the React HeroBanner component once it mounts. -->
    <section id="static-hero-placeholder" class="fixed top-0 left-0 w-full h-screen overflow-hidden z-50 transition-opacity duration-500 ease-out">
      <div class="absolute inset-0 flex items-center justify-center bg-gradient-to-br from-dark via-dark-light to-dark">
        <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>
        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
          <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tight text-primary">
            BORN TO LEAD
          </h1>
          <p class="text-lg md:text-xl mt-4 max-w-xl mx-auto opacity-80 text-white">
            Explore our motorcycle lineup that defines the road ahead
          </p>
          <a href="/products?category=motorcycle"
            class="inline-block mt-8 px-8 py-3 bg-white text-dark font-semibold rounded-full">
            Explore Now
          </a>
        </div>
      </div>
    </section>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
